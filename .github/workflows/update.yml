name: update

on:
  schedule:
    - cron: '5 * * 5-9 *'    # 5〜9月は毎時 :05（UTC）
    - cron: '5 0 * * 1'      # オフシーズン含め毎週月曜 00:05（UTC）
  workflow_dispatch:          # 手動実行

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1本に絞る（古い実行はキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build page
        run: python build.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - id: deploy
        uses: actions/deploy-pages@v4
