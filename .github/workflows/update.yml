name: update

on:
  schedule:
    - cron: '5 * * 5-9 *'    # 5〜9月は毎時 :05（UTC）
    - cron: '5 0 * * 1'      # オフシーズン含め毎週月曜 00:05（UTC）
  push:
    branches: [main]          # push時も即時実行
  workflow_dispatch:          # 手動実行

permissions:
  contents: write             # キャッシュJSONのコミットに必要
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build page
        run: python build.py

      - name: Commit history cache if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history_cache.json || true
          git diff --cached --quiet || git commit -m "chore: update history_cache.json [skip ci]"
          git push || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - id: deploy
        uses: actions/deploy-pages@v4
